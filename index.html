<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zak - Portfolio</title>
    <link rel="stylesheet" href="style/main.css">


    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E4KPHGFGJE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-E4KPHGFGJE');
    </script>

</head>

<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-logo">Zak</div>
            <button class="nav-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#services" class="nav-link">Services</a></li>
                <li><a href="#experience" class="nav-link">Experience</a></li>
                <li><a href="#projects" class="nav-link">Projects</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#stats" class="nav-link">Stats</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Home Section -->
    <section id="home" class="section home-section">
        <div class="container">
            <div class="home-content">
                <div class="home-text">
                    <h1 class="home-greeting">Hi, I'm <span class="highlight" id="home-name">Zak</span></h1>
                    <p class="home-title" id="home-title"></p>
                    <div class="home-actions">
                        <a href="#" class="btn btn-primary" id="resume-btn">View Resume</a>
                        <a href="#" class="btn btn-secondary" id="github-btn">GitHub</a>
                    </div>
                </div>
                <div class="home-image">
                    <img src="assets/images/pfp.jpeg" alt="Profile" id="profile-img">
                </div>
            </div>
        </div>
    </section>

    <!-- Services Section -->
    <section id="services" class="section">
        <div class="container">
            <h2 class="section-title">Services</h2>
            <div class="services-grid" id="services-grid"></div>
        </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="section">
        <div class="container">
            <h2 class="section-title">Experience</h2>
            <div class="timeline" id="timeline"></div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section">
        <div class="container">
            <h2 class="section-title">Pinned Projects</h2>
            <div class="projects-grid" id="projects-grid"></div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section">
        <div class="container">
            <h2 class="section-title" id="about-title">About</h2>
            <div class="about-content">
                <div class="about-image">
                    <img src="" alt="About" id="about-img">
                </div>
                <div class="about-text">
                    <p id="about-description"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Stats Section -->
    <section id="stats" class="section">
        <div class="container">
            <h2 class="section-title">Stats</h2>
            <div class="stats-grid" id="stats-grid"></div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title">Contact</h2>
            <div class="contact-grid" id="contact-grid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Zak. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
